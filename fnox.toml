# nodewarden — secrets resolved from the macOS keychain.
#
# Write a secret with:   fnox set --global -p keychain <KEY>
#
# Shared item names ARE the cross-repo contract — renaming a key here
# without updating every consumer breaks auth silently. Coordinate name
# changes across repos.
#
# This file is the manifest of what the repo *needs* — fnox tasks in
# mise.toml inject them as env vars at deploy/dev time via `fnox exec`.

[providers.keychain]
type = "keychain"
service = "fnox"

[secrets]
# Cloudflare deploy credentials (shared across every CF Workers repo).
CLOUDFLARE_API_TOKEN     = { provider = "keychain", value = "CLOUDFLARE_API_TOKEN" }
CLOUDFLARE_ACCOUNT_ID    = { provider = "keychain", value = "CLOUDFLARE_ACCOUNT_ID" }

# nodewarden-specific JWT signing secret. Generated + stored by:
#   mise run jwt:set
# Same task pushes it to the Worker as wrangler secret JWT_SECRET.
NODEWARDEN_JWT_SECRET    = { provider = "keychain", value = "NODEWARDEN_JWT_SECRET" }

# Bitwarden CLI credentials (used by bw:bootstrap to wire the CLI to NodeWarden).
BW_CLIENTID              = { provider = "keychain", value = "BW_CLIENTID" }
BW_CLIENTSECRET          = { provider = "keychain", value = "BW_CLIENTSECRET" }
BW_SESSION               = { provider = "keychain", value = "BW_SESSION" }
