# nodewarden — operator deploy tooling.
#
# Bitwarden-compatible self-hosted server (fork of shuaiplus/nodewarden).
# Heavy lifting lives in the shared joeblew999/.github/mise-tasks library
# (full nu port at v0.10.0+ — bw:*, cf:*, secrets:*, prove:*, wrangler:*,
# mobile:*, rust:*, fnox:init, env:resolve, release).
#
# This file only adds:
#   - tools pin (incl. @bitwarden/cli for bw:* tasks)
#   - phased deploy orchestrators (1-install, 6-build, 10-deploy)
#   - d1:migrate + jwt:set bootstrap helpers (nu)
#   - prove:* health checks specific to nodewarden (nu)
#
# Deploy lifecycle (fresh machine):
#   1. fnox set --global -p keychain CLOUDFLARE_API_TOKEN   # one-time per machine
#      fnox set --global -p keychain CLOUDFLARE_ACCOUNT_ID
#   2. mise install                                          # node + wrangler + bw + fnox + nu
#   3. mise run 1-install                                    # npm deps
#   4. mise run cf:provision-d1-r2                           # creates D1 + R2 (idempotent)
#   5. mise run d1:migrate                                   # apply migrations/0001_init.sql
#   6. mise run jwt:set                                      # generate + push JWT_SECRET
#   7. mise run 10-deploy                                    # build + deploy
#   8. (manual) open URL → register account → generate API key in Settings
#   9. mise run bw:bootstrap                                 # wire bw CLI ↔ fnox (3 hidden prompts)
#   10. mise run bw:migrate-from-keychain                    # push existing keychain → NodeWarden

[task_config]
# Shared joeblew999 task library — v0.10.0 = full nu port.
includes = ["git::https://github.com/joeblew999/.github.git//mise-tasks?ref=v0.10.0"]

[tools]
node                     = "lts"
"npm:wrangler"           = "latest"
"npm:@bitwarden/cli"     = "latest"   # bw — used by shared bw:* tasks
"github:jdx/fnox"        = "1.23"
"github:nushell/nushell" = "0.112"    # nu — pinned (matches .github [tools]); used by shared mise-tasks + local prove:*
"aqua:cli/cli"           = "2"
"aqua:jqlang/jq"         = "1"

[env]
DEFAULT_ENV    = "production"
FNOX_SYNC_KEYS = ""        # nothing to sync to GHA — Worker secret managed via wrangler

# ── Per-fork inline tasks (everything else comes from shared) ──────────────

[tasks."1-install"]
description = "Install npm deps (first time)."
run         = "npm install"

[tasks."6-build"]
description = "Build the Vite SPA web vault (dist/)."
depends     = ["1-install"]
run         = "npm run build"

[tasks."10-deploy"]
description = "Build + deploy the Worker. Validates CF token first."
depends     = ["cf:token-check", "6-build"]
run         = "wrangler deploy"

[tasks."10b-redeploy"]
description = "Re-deploy without rebuilding (fast iteration after wrangler.toml/secret changes)."
run         = "wrangler deploy"

[tasks."dev"]
description = "Run nodewarden locally (wrangler dev with R2 mode)."
run         = "npm run dev"

[tasks."tail"]
description = "Follow live worker logs."
run         = "wrangler tail"

# ── Bootstrap tasks (run once per environment) ─────────────────────────────

[tasks."d1:migrate"]
description = "Apply migrations/0001_init.sql to the remote D1 database (idempotent: re-running on a populated DB will error harmlessly)."
run         = "wrangler d1 execute nodewarden-db --remote --file migrations/0001_init.sql"

[tasks."jwt:set"]
description = "Generate a 64-char random JWT_SECRET, store in fnox keychain (NODEWARDEN_JWT_SECRET) AND push to wrangler as Worker secret. Idempotent: replaces both."
shell = "nu -c"
run = '''
let secret = (^openssl rand -base64 48 | str trim)
$secret | ^fnox set --global -p keychain NODEWARDEN_JWT_SECRET
$secret | ^wrangler secret put JWT_SECRET
print "✓ JWT_SECRET stored in fnox + wrangler"
print "  Back up offline:  fnox get NODEWARDEN_JWT_SECRET | pbcopy  →  paste into iCloud Notes / paper"
'''

# ── Nodewarden-specific prove tasks (nw: prefix to avoid collision with shared prove:*) ─
# The shared library's prove:deployed / prove:bindings / prove:secrets are
# scoped to CF Access deployments (auth-service / kv-manager pattern).
# Nodewarden has no CF Access — it gates with Bitwarden's own auth — so
# we need different probes here under a distinct namespace.

[tasks."nw:url"]
description = "HTTP smoke test: GET /alive on the deployed NodeWarden. Hardcoded URL — no wrangler auth needed."
shell = "nu -c"
run = '''
let url = "https://nodewarden.gedw99.workers.dev"
print $"→ ($url)/alive"
let code = (^curl -sS -o /dev/null -w '%{http_code}' $"($url)/alive" | str trim)
if $code == "200" {
  print "  ✓ HTTP 200"
} else {
  print --stderr $"  ✗ HTTP ($code)"
  exit 1
}
'''

[tasks."nw:jwt"]
description = "Confirm JWT_SECRET is set on the NodeWarden Worker (NW-specific — different from shared prove:secrets which checks 4 CF-Access secrets)."
shell = "nu -c"
run = '''
$env.CLOUDFLARE_API_TOKEN = (^fnox get CLOUDFLARE_API_TOKEN | str trim)
let listing = (^wrangler secret list | complete | get stdout)
if ($listing | str contains '"name": "JWT_SECRET"') {
  print "  ✓ JWT_SECRET set on Worker"
} else {
  print --stderr "  ✗ JWT_SECRET missing — run mise run jwt:set"
  exit 1
}
'''

[tasks."nw:all"]
description = "Run NodeWarden health checks: HTTP /alive + JWT_SECRET set + bindings (delegates to shared prove:bindings for the wrangler dry-run)."
depends     = ["nw:url", "nw:jwt", "prove:bindings"]
